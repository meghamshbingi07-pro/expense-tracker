<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard">

<div class="sidebar">
<h2>💰 Expense</h2>

<ul>
<li>📊 Dashboard</li>
<li>💸 Expenses</li>
<li>📈 Analytics</li>
<li>⚙ Settings</li>
</ul>

</div>

<div class="main">

<div class="topbar">

<h1>Expense Dashboard</h1>

<div class="expense-form">

<input type="number" id="amount" placeholder="Amount (₹)" min="1" step="0.01">
<select id="category">
    <option value="">Select Category</option>
    <option value="Food">🍔 Food</option>
    <option value="Travel">✈️ Travel</option>
    <option value="Shopping">🛍️ Shopping</option>
    <option value="Bills">💡 Bills</option>
    <option value="Entertainment">🎮 Entertainment</option>
    <option value="Transportation">🚗 Transportation</option>
    <option value="Healthcare">🏥 Healthcare</option>
    <option value="Education">📚 Education</option>
    <option value="Groceries">🛒 Groceries</option>
    <option value="Utilities">⚡ Utilities</option>
</select>
<input type="date" id="date" value="2024-03-09">
<input type="text" id="description" placeholder="Description">
<button onclick="addExpense()">Add Expense</button>

</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Expense</h3>
<p id="totalExpense">₹0</p>
</div>

<div class="card">
<h3>Transactions</h3>
<p id="totalTransactions">0</p>
</div>

<div class="card">
<h3>Top Category</h3>
<p id="topCategory">-</p>
</div>

</div>

<div class="analytics">

<div class="chart-box">
<canvas id="expenseChart"></canvas>
</div>

<div class="chart-box">
<canvas id="categoryChart"></canvas>
</div>

<div class="table-box">

<div class="table-controls">
<select id="categoryFilter" onchange="filterByCategory()">
    <option value="">All Categories</option>
    <option value="Food">🍔 Food</option>
    <option value="Travel">✈️ Travel</option>
    <option value="Shopping">🛍️ Shopping</option>
    <option value="Bills">💡 Bills</option>
    <option value="Entertainment">🎮 Entertainment</option>
    <option value="Transportation">🚗 Transportation</option>
    <option value="Healthcare">🏥 Healthcare</option>
    <option value="Education">📚 Education</option>
    <option value="Groceries">🛒 Groceries</option>
    <option value="Utilities">⚡ Utilities</option>
</select>

<div class="export-buttons">
    <button onclick="exportToJSON()" title="Export to JSON"><i class="fas fa-file-code"></i> JSON</button>
    <button onclick="exportToCSV()" title="Export to CSV"><i class="fas fa-file-csv"></i> CSV</button>
    <button onclick="generateMonthlyReport()" title="Monthly Report"><i class="fas fa-chart-bar"></i> Report</button>
</div>
</div>

<table>
<thead>
<tr>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Description</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="expenseList"></tbody>

</table>

</div>

</div>

<div class="activity">
<h3>Recent Activity</h3>
<ul id="activityLog"></ul>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
